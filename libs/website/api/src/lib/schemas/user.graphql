fragment FullPaymentProviderCustomer on PaymentProviderCustomer {
  paymentProviderID
  customerID
}

fragment FullBaseUser on BaseUser {
  id
  name
  firstName
  flair

  image {
    ...FullImage
  }

  properties {
    ...FullProperty
  }
}

fragment FullUser on User {
  ...FullBaseUser
}

fragment FullSensitiveDataUser on SensitiveDataUser {
  ...FullBaseUser
  permissions
  birthday
  email
  pendingEmail
  totpEnabled

  address {
    ...FullAddress
  }

  paymentProviderCustomers {
    ...FullPaymentProviderCustomer
  }
}

fragment FullAddress on UserAddress {
  company
  streetAddress
  streetAddressNumber
  streetAddress2
  streetAddress2Number
  zipCode
  city
  country
}

fragment FullSessionWithTokenWithoutUser on SessionWithTokenWithoutUser {
  token
  expiresAt
  createdAt
}

fragment FullSessionWithToken on SessionWithToken {
  token
  expiresAt
  createdAt
}

query Me {
  me {
    ...FullSensitiveDataUser
  }
}

query CheckLoginOtp($email: String!) {
  checkLoginOtp(email: $email)
}

mutation LoginWithCredentials($email: String!, $password: String!, $totpToken: String) {
  createSession(email: $email, password: $password, totpToken: $totpToken) {
    ...FullSessionWithToken
  }
}

mutation LoginWithEmail($email: String!) {
  sendWebsiteLogin(email: $email)
}

mutation LoginWithJWT($jwt: String!) {
  createSessionWithJWT(jwt: $jwt) {
    ...FullSessionWithToken
  }
}

mutation Register(
  $name: String!
  $flair: String
  $firstName: String
  $birthday: DateTime
  $address: UserAddressInput
  $email: String!
  $password: String
  $challengeAnswer: ChallengeInput!
) {
  registerMember(
    name: $name
    flair: $flair
    firstName: $firstName
    birthday: $birthday
    address: $address
    email: $email
    password: $password
    challengeAnswer: $challengeAnswer
  ) {
    user {
      ...FullSensitiveDataUser
    }

    session {
      ...FullSessionWithTokenWithoutUser
    }
  }
}

mutation UpdateUser(
  $firstName: String
  $flair: String
  $name: String
  $password: String
  $address: UserAddressInput
  $birthday: DateTime
) {
  updateCurrentUser(
    name: $name
    firstName: $firstName
    flair: $flair
    password: $password
    address: $address
    birthday: $birthday
  ) {
    ...FullSensitiveDataUser
  }
}

mutation UpdatePassword($password: String!, $passwordRepeated: String!) {
  updatePassword(password: $password, passwordRepeated: $passwordRepeated) {
    ...FullSensitiveDataUser
  }
}

mutation RequestEmailChange($newEmail: String!) {
  requestEmailChange(newEmail: $newEmail)
}

mutation GenerateTotpSetup {
  generateTotpSetup(website: true) {
    secret
    uri
    qrCode
  }
}

mutation EnableTotp($totpToken: String!) {
  enableTotp(totpToken: $totpToken)
}

mutation ConfirmEmailChange($newEmail: String!) {
  confirmEmailChange(newEmail: $newEmail) {
    ...FullSensitiveDataUser
  }
}
