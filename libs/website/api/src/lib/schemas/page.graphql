fragment SlimPageRevision on PageRevision {
  id
  publishedAt
  description
  title
  image {
    ...FullImage
  }
}

fragment FullPageRevision on PageRevision {
  ...SlimPageRevision

  socialMediaDescription
  socialMediaTitle
  socialMediaImage {
    ...FullImage
  }

  properties {
    ...FullProperty
  }

  blocks {
    ...FullBlock
  }
}

fragment SlimPage on Page {
  id
  publishedAt
  modifiedAt
  url
  slug

  tags {
    ...FullTag
  }

  latest {
    ...SlimPageRevision
  }
}

fragment FullPage on Page {
  ...SlimPage

  latest {
    ...FullPageRevision
  }
}

query Page($slug: String, $id: String) {
  page(slug: $slug, id: $id) {
    ...FullPage
  }
}

query PageList(
  $filter: PageFilter
  $cursor: String
  $take: Int
  $skip: Int
  $order: SortOrder
  $sort: PageSort
) {
  pages(
    filter: $filter
    cursorId: $cursor
    take: $take
    skip: $skip
    order: $order
    sort: $sort
  ) {
    nodes {
      ...SlimPage
    }

    pageInfo {
      startCursor
      endCursor
      hasNextPage
      hasPreviousPage
    }

    totalCount
  }
}
