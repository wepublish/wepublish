fragment FullPageTeaser on PageTeaser {
  type
  image {
    ...FullImage
  }

  preTitle
  title
  lead

  page {
    ...SlimPage
  }
}

fragment FullArticleTeaser on ArticleTeaser {
  type
  image {
    ...FullImage
  }

  preTitle
  title
  lead

  article {
    ...SlimArticle

    latest {
      blocks {
        __typename

        ... on PollBlock {
          disabled
          blockStyle: blockStyleName
          poll {
            ...FullPoll
          }
        }
      }
    }
  }
}

fragment FullEventTeaser on EventTeaser {
  type
  image {
    ...FullImage
  }

  preTitle
  title
  lead

  event {
    ...FullEvent
  }
}

fragment FullImageBlock on ImageBlock {
  disabled
  blockStyle: blockStyleName
  caption
  linkUrl
  image {
    ...FullImage
  }
}

fragment FullImageGalleryBlock on ImageGalleryBlock {
  disabled
  blockStyle: blockStyleName
  images {
    caption
    image {
      ...FullImage
    }
  }
}

fragment FullTitleBlock on TitleBlock {
  disabled
  blockStyle: blockStyleName
  preTitle
  title
  lead
}

fragment FullQuoteBlock on QuoteBlock {
  disabled
  blockStyle: blockStyleName
  quote
  author
  image {
    ...FullImage
  }
}

fragment FullRichTextBlock on RichTextBlock {
  disabled
  blockStyle: blockStyleName
  richText
}

fragment FullHTMLBlock on HTMLBlock {
  disabled
  blockStyle: blockStyleName
  html
}

fragment FullSubscribeBlock on SubscribeBlock {
  disabled
  blockStyle: blockStyleName
  memberPlanIds
  periodicityDisplay
  memberPlans {
    ...FullMemberPlan
  }
  fields
}

fragment FullEventBlock on EventBlock {
  disabled
  blockStyle: blockStyleName
  events {
    ...FullEvent
  }
}

fragment FullCommentBlock on CommentBlock {
  disabled
  blockStyle: blockStyleName
  comments {
    ...FullComment
  }
}

fragment FullPollBlock on PollBlock {
  disabled
  blockStyle: blockStyleName
  poll {
    ...FullPoll
  }
}

fragment FullCrowdfundingBlock on CrowdfundingBlock {
  disabled
  blockStyle: blockStyleName
  crowdfunding {
    ...FullCrowdfunding
  }
}

fragment FullListicleBlock on ListicleBlock {
  disabled
  blockStyle: blockStyleName
  items {
    title
    richText
    image {
      ...FullImage
    }
  }
}

fragment FullBreakBlock on BreakBlock {
  disabled
  blockStyle: blockStyleName
  text
  richText
  hideButton
  linkTarget
  linkText
  linkURL
  image {
    ...FullImage
  }
}

fragment FullFacebookPostBlock on FacebookPostBlock {
  disabled
  blockStyle: blockStyleName
  userID
  postID
}

fragment FullFacebookVideoBlock on FacebookVideoBlock {
  disabled
  blockStyle: blockStyleName
  userID
  videoID
}

fragment FullInstagramPostBlock on InstagramPostBlock {
  disabled
  blockStyle: blockStyleName
  postID
}

fragment FullTwitterTweetBlock on TwitterTweetBlock {
  disabled
  blockStyle: blockStyleName
  userID
  tweetID
}

fragment FullVimeoVideoBlock on VimeoVideoBlock {
  disabled
  blockStyle: blockStyleName
  videoID
}

fragment FullYouTubeVideoBlock on YouTubeVideoBlock {
  disabled
  blockStyle: blockStyleName
  videoID
}

fragment FullStreamableVideoBlock on StreamableVideoBlock {
  disabled
  blockStyle: blockStyleName
  videoID
}

fragment FullSoundCloudTrackBlock on SoundCloudTrackBlock {
  disabled
  blockStyle: blockStyleName
  trackID
}

fragment FullPolisConversationBlock on PolisConversationBlock {
  disabled
  blockStyle: blockStyleName
  conversationID
}

fragment FullTikTokVideoBlock on TikTokVideoBlock {
  disabled
  blockStyle: blockStyleName
  userID
  videoID
}

fragment FullBildwurfAdBlock on BildwurfAdBlock {
  disabled
  blockStyle: blockStyleName
  zoneID
}

fragment FullIFrameBlock on IFrameBlock {
  disabled
  blockStyle: blockStyleName
  url
  title
  width
  height
  styleCustom
  sandbox
}

fragment BlockWithoutTeaser on BlockContent {
  __typename

  ... on TitleBlock {
    ...FullTitleBlock
  }

  ... on ImageBlock {
    ...FullImageBlock
  }

  ... on ImageGalleryBlock {
    ...FullImageGalleryBlock
  }

  ... on QuoteBlock {
    ...FullQuoteBlock
  }

  ... on RichTextBlock {
    ...FullRichTextBlock
  }

  ... on HTMLBlock {
    ...FullHTMLBlock
  }

  ... on SubscribeBlock {
    ...FullSubscribeBlock
  }

  ... on EventBlock {
    ...FullEventBlock
  }

  ... on CommentBlock {
    ...FullCommentBlock
  }

  ... on PollBlock {
    ...FullPollBlock
  }

  ... on CrowdfundingBlock {
    ...FullCrowdfundingBlock
  }

  ... on ListicleBlock {
    ...FullListicleBlock
  }

  ... on BreakBlock {
    ...FullBreakBlock
  }

  ... on FacebookPostBlock {
    ...FullFacebookPostBlock
  }

  ... on FacebookVideoBlock {
    ...FullFacebookVideoBlock
  }

  ... on InstagramPostBlock {
    ...FullInstagramPostBlock
  }

  ... on TwitterTweetBlock {
    ...FullTwitterTweetBlock
  }

  ... on VimeoVideoBlock {
    ...FullVimeoVideoBlock
  }

  ... on YouTubeVideoBlock {
    ...FullYouTubeVideoBlock
  }

  ... on StreamableVideoBlock {
    ...FullStreamableVideoBlock
  }

  ... on SoundCloudTrackBlock {
    ...FullSoundCloudTrackBlock
  }

  ... on PolisConversationBlock {
    ...FullPolisConversationBlock
  }

  ... on TikTokVideoBlock {
    ...FullTikTokVideoBlock
  }

  ... on BildwurfAdBlock {
    ...FullBildwurfAdBlock
  }

  ... on IFrameBlock {
    ...FullIFrameBlock
  }

  ... on TeaserSlotsBlock {
    blockStyle: blockStyleName
  }

  ... on TeaserListBlock {
    blockStyle: blockStyleName
  }

  ... on TeaserGridBlock {
    blockStyle: blockStyleName
  }

  ... on TeaserGridFlexBlock {
    blockStyle: blockStyleName
  }

  ... on FlexBlock {
    blockStyle: blockStyleName
  }

  ... on UnknownBlock {
    blockStyle: blockStyleName
  }
}

fragment FullFlexAlignment on FlexAlignment {
  i
  x
  y
  w
  h
}

fragment FullTeaser on Teaser {
  ... on ArticleTeaser {
    ...FullArticleTeaser
  }

  ... on PageTeaser {
    ...FullPageTeaser
  }

  ... on EventTeaser {
    ...FullEventTeaser
  }

  ... on CustomTeaser {
    type
    image {
      ...FullImage
    }

    preTitle
    title
    lead
    contentUrl
    openInNewTab
    properties {
      key
      value
    }
  }
}

fragment FullFlexBlock on FlexBlock {
  disabled
  blockStyle: blockStyleName
  type
  blocks {
    alignment {
      ...FullFlexAlignment
    }

    block {
      __typename
      ...BlockWithoutTeaser

      ... on TeaserSlotsBlock {
        ...FullTeaserSlotsBlock
      }

      ... on TeaserListBlock {
        ...FullTeaserListBlock
      }
    }
  }
}

fragment FullFlexTeaser on FlexTeaser {
  alignment {
    ...FullFlexAlignment
  }

  teaser {
    ...FullTeaser
  }
}

fragment FullTeaserGridFlexBlock on TeaserGridFlexBlock {
  title
  type
  disabled
  blockStyle: blockStyleName
  flexTeasers {
    ...FullFlexTeaser
  }
}

fragment FullTeaserGridBlock on TeaserGridBlock {
  title
  type
  disabled
  blockStyle: blockStyleName
  teasers {
    ...FullTeaser
  }
  numColumns
}

fragment FullTeaserListBlock on TeaserListBlock {
  title
  type
  disabled
  blockStyle: blockStyleName
  filter {
    tags
  }
  teasers {
    ...FullTeaser
  }
}

fragment FullTeaserSlotsBlock on TeaserSlotsBlock {
  title
  type
  disabled
  blockStyle: blockStyleName
  teasers {
    ...FullTeaser
  }
}

fragment FullBlock on BlockContent {
  ...BlockWithoutTeaser

  ... on TeaserGridFlexBlock {
    ...FullTeaserGridFlexBlock
  }

  ... on TeaserGridBlock {
    ...FullTeaserGridBlock
  }

  ... on TeaserListBlock {
    ...FullTeaserListBlock
  }

  ... on TeaserSlotsBlock {
    ...FullTeaserSlotsBlock
  }

  ... on FlexBlock {
    ...FullFlexBlock
  }
}
