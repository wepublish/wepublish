fragment FullBanner on Banner {
    id
    title
    text
    cta

    tags
    showOnArticles
    showOnPages {
        ...PageRef
    }

    image {
        ...FullImage
    }

    actions {
        ...FullBannerAction
    }
}

fragment FullBannerAction on BannerAction {
  id
  label
  url
  style
}

fragment PageRef on PageModel {
  id
  #published {
  #  slug
  #}
}

query PrimaryBanner {
    primaryBanner {
        ...FullBanner
    }
}
