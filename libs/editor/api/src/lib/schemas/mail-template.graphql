query MailTemplate {
  mailTemplates {
    ...FullMailTemplate
  }
  provider {
    ...FullMailProvider
  }
}

mutation SynchronizeMailTemplates {
  syncTemplates
}

query MailTemplatePlaceholders {
  mailTemplatePlaceholders {
    event
    placeholders {
      key
      example
    }
  }
}

fragment FullMailTemplate on MailTemplateWithUrlAndStatusModel {
  id
  name
  description
  externalMailTemplateId
  remoteMissing
  url
  status
}

fragment FullMailProvider on MailProviderModel {
  name
  type
}
