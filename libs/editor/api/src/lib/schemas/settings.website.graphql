fragment FullWebsiteSettings on WebsiteSettings {
  analytics {
    googleAnalytics {
      enabled
      key
    }

    googleTagManager {
      enabled
      key
    }

    plausible {
      enabled
      key
    }

    piwik {
      enabled
      key
    }
  }

  ads {
    sparkLoop {
      enabled
      key
    }
  }

  theme
  fonts {
    weight
    style
    name
  }
}

query WebsiteSettings {
  websiteSettings {
    ...FullWebsiteSettings
  }
}

mutation UpdateWebsiteSettings(
  $analytics: WebsiteAnalyticsInput
  $ads: WebsiteAdsInput
  $theme: JSONObject
  $fonts: [WebsiteRemoteFontInput!]
) {
  updateWebsiteSettings(
    analytics: $analytics
    ads: $ads
    theme: $theme
    fonts: $fonts
  ) {
    ...FullWebsiteSettings
  }
}
