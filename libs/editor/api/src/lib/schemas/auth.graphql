query CheckLoginOtp($email: String!) {
  checkLoginOtp(email: $email)
}

mutation CreateSession($email: String!, $password: String!, $totpToken: String) {
  createSession(email: $email, password: $password, totpToken: $totpToken) {
    user {
      email
      totpEnabled
      totpExempt
      roles {
        ...FullUserRole
      }
    }
    token
    totpEnabled
  }
}

mutation CreateSessionWithJWT($jwt: String!, $totpToken: String) {
  createSessionWithJWT(jwt: $jwt, totpToken: $totpToken) {
    user {
      email
      totpEnabled
      totpExempt
      roles {
        ...FullUserRole
      }
    }
    token
    totpEnabled
  }
}

mutation CreateJWTForWebsiteLogin {
  createJWTForWebsiteLogin {
    token
    expiresAt
  }
}

mutation SendWebsiteLogin($email: String!) {
  sendWebsiteLogin(email: $email)
}

mutation SendPasswordResetEmail($email: String!) {
  sendPasswordResetEmail(email: $email)
}

mutation ResetPasswordWithToken($token: String!, $password: String!) {
  resetPasswordWithToken(token: $token, password: $password)
}

mutation GenerateTotpSetup {
  generateTotpSetup {
    secret
    uri
  }
}

mutation EnableTotp($totpToken: String!) {
  enableTotp(totpToken: $totpToken)
}

mutation ResetUserTotp($userId: String!) {
  resetUserTotp(userId: $userId)
}
