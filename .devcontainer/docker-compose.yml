version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    networks:
      - default

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  database:
    image: postgres:18
    command: postgres -c shared_preload_libraries=pg_stat_statements
    ports:
      - 5432:5432
    volumes:
      - database_data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=wepublish
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
      - default

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  storage:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=password
    entrypoint: ['/bin/sh']
    command: [
        '-ec',
        "mkdir -p /data/wepublish-staff /data/wepublish-transformed; \
        exec minio server /data --console-address=:9001",
      ]
    ports:
      - 9000:9000
      - 9001:9001
    networks:
      - default
    volumes:
      - storage_data:/data

  mailpit:
    image: axllent/mailpit:latest
    # SMTP endpoint on 1025 (the app connects via MAIL_SMTP_HOST=mailpit),
    # web UI on 8025 to read caught mails.
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - default

volumes:
  database_data:
  storage_data:
