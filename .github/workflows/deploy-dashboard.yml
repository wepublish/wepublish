name: Deploy overview dashboard

on:
  # Refresh as soon as any production deployment finishes.
  deployment_status:
  # Fallback so the page never goes more than 30 min out of date even if the
  # deploy workflow forgets to record a status (e.g. canceled jobs).
  schedule:
    - cron: '*/30 * * * *'
  # Manual trigger.
  workflow_dispatch:

permissions:
  contents: read
  deployments: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/build-deploy-dashboard.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
