name: Setup production database for review build

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Name of the project you want to get database from eg. bajour, tsri'
        required: true
        type: string
      instance_name:
        description: 'Only needed for review instances (eg. review01, review02). Leave empty for staging where instance name equals the project name.'
        required: false
        type: string
      akk:
        description: 'Are you sure you want to overwrite the existing review database? [Yes]'
        required: true
        type: string

jobs:
  sync-db:
    name: Copy Database
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Resolve instance name
        id: resolve
        env:
          INSTANCE_NAME: ${{ inputs.instance_name }}
          PROJECT: ${{ inputs.project }}
        run: |
          if [ -z "$INSTANCE_NAME" ]; then
            echo "instance_name=${PROJECT}" >> "$GITHUB_OUTPUT"
          else
            echo "instance_name=${INSTANCE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm destructive action
        shell: bash
        env:
          AKK: ${{ inputs.akk }}
        run: |
          VAL="$(printf '%s' "$AKK" | tr -d '[:space:]')"
          if ! printf '%s\n' "$VAL" | grep -qiE '^yes$'; then
            echo "::error::Confirmation failed. You must type exactly 'Yes' to proceed."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Get and unpack project production database
        env:
          DUMP_USER: ${{ secrets.HTTP_PROD_DUMP_SHARE_USER }}
          DUMP_PASSWORD: ${{ secrets.HTTP_PROD_DUMP_SHARE_PASSWORD }}
          DUMP_HOST: ${{ secrets.HTTP_PROD_DUMP_SHARE_URL }}
          PROJECT: ${{ inputs.project }}
        run: |
          curl --fail --silent --show-error --user "${DUMP_USER}:${DUMP_PASSWORD}" --output database.dump.gz "https://${DUMP_HOST}/${PROJECT}.sql.gz"
          gzip -d database.dump.gz

      - name: Clean existing database
        env:
          PGPASSWORD: ${{ secrets.MAIN_DATABASE_PASSWORD }}
          PGHOST: ${{ secrets.MAIN_DATABASE_HOSTNAME }}
          PGUSER: ${{ secrets.MAIN_DATABASE_USERNAME }}
          PGSSLMODE: verify-full
          PGSSLROOTCERT: libs/api/prisma/ca.crt
          INSTANCE_NAME: ${{ steps.resolve.outputs.instance_name }}
        run: |
          psql -h "$PGHOST" -U "$PGUSER" -d "wepublish-${INSTANCE_NAME}-staging" --set ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          SQL

      - name: Restore Dump to Review Database
        env:
          PGPASSWORD: ${{ secrets.MAIN_DATABASE_PASSWORD }}
          PGHOST: ${{ secrets.MAIN_DATABASE_HOSTNAME }}
          PGUSER: ${{ secrets.MAIN_DATABASE_USERNAME }}
          PGSSLMODE: verify-full
          PGSSLROOTCERT: libs/api/prisma/ca.crt
          INSTANCE_NAME: ${{ steps.resolve.outputs.instance_name }}
        run: |
          psql -h "$PGHOST" -U "$PGUSER" -d "wepublish-${INSTANCE_NAME}-staging" --set ON_ERROR_STOP=1 -f database.dump

      - name: Cleanup
        if: always()
        run: rm -f database.dump
