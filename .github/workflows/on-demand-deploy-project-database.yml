name: Setup production database for review build

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Name of the project you want to get database from eg. bajour, tsri'
        required: true
        type: string
      instance_name:
        description: 'Only needed for review instances (eg. review01, review02). Leave empty for staging where instance name equals the project name.'
        required: false
        type: string
      akk:
        description: 'Are you sure you want to overwrite the existing review database? [Yes]'
        required: true
        type: string

jobs:
  sync-db:
    name: Trigger Database Sync Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Resolve instance name
        id: resolve
        env:
          INSTANCE_NAME: ${{ inputs.instance_name }}
          PROJECT: ${{ inputs.project }}
        run: |
          if [ -z "$INSTANCE_NAME" ]; then
            echo "instance_name=${PROJECT}" >> "$GITHUB_OUTPUT"
          else
            echo "instance_name=${INSTANCE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm destructive action
        shell: bash
        env:
          AKK: ${{ inputs.akk }}
        run: |
          VAL="$(printf '%s' "$AKK" | tr -d '[:space:]')"
          if ! printf '%s\n' "$VAL" | grep -qiE '^yes$'; then
            echo "::error::Confirmation failed. You must type exactly 'Yes' to proceed."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verify project exists
        env:
          PROJECT: ${{ inputs.project }}
        run: |
          if [ ! -f "apps/${PROJECT}/deployment.config.json" ]; then
            echo "::error::Project '${PROJECT}' not found. Expected file 'apps/${PROJECT}/deployment.config.json'."
            echo "Available projects:"
            find apps -maxdepth 2 -name deployment.config.json -printf '  - %h\n' | sed 's|  - apps/|  - |' | sort
            exit 1
          fi

      - name: Trigger database sync webhook
        env:
          DATABASE_SYNC_WEBHOOK_URL: ${{ secrets.DATABASE_SYNC_WEBHOOK_URL }}
          DATABASE_SYNC_WEBHOOK_TOKEN: ${{ secrets.DATABASE_SYNC_WEBHOOK_TOKEN }}
          PROJECT: ${{ inputs.project }}
          INSTANCE_NAME: ${{ steps.resolve.outputs.instance_name }}
        run: |
          jq -nc --arg project "$PROJECT" --arg instance_name "$INSTANCE_NAME" \
            '{project:$project, instance_name:$instance_name}' \
            | curl -fsS -X POST "$DATABASE_SYNC_WEBHOOK_URL" \
                -H "Authorization: Bearer $DATABASE_SYNC_WEBHOOK_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary @-
