version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # Grouped PRs count toward this limit; keep it above the number of groups
    open-pull-requests-limit: 15
    # Only consider versions that have been out for a week, except for the
    # core framework packages. Shrinks the candidate set per run so the
    # updater stays well under Dependabot's fixed 55-minute job limit.
    cooldown:
      default-days: 7
      exclude:
        - "nx"
        - "@nx/*"
        - "@nestjs/*"
        - "nestjs-*"
        - "next"
        - "@next/*"
        - "eslint-config-next"
        - "prisma"
        - "@prisma/*"
        - "react"
        - "react-dom"
        - "@types/react"
        - "@types/react-dom"
        - "@apollo/*"
        - "apollo-*"
    groups:
      important:
        patterns:
          - "nx"
          - "@nx/*"
          - "@nestjs/*"
          - "nestjs-*"
          - "next"
          - "@next/*"
          - "eslint-config-next"
          - "prisma"
          - "@prisma/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@apollo/*"
          - "apollo-*"
      tooling:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "graphql"
          - "graphql-*"
          - "@graphql-codegen/*"
          - "@graphql-tools/*"
          - "@types/graphql"
          - "@types/graphql-upload"
          - "storybook"
          - "storybook-*"
          - "@storybook/*"
          - "@chromatic-com/storybook"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
          - "pretty-quick"
          - "husky"
          - "@sentry/*"
          - "@babel/*"
          - "babel-*"
          - "@swc/*"
          - "@swc-node/*"
          - "swc-loader"
          - "webpack"
          - "*-webpack-plugin"
          - "@types/webpack*"
          - "@svgr/webpack"
          - "@pmmmwh/*"
          - "react-refresh"
          - "url-loader"
          - "typescript"
          - "ts-node"
          - "tsx"
          - "tslib"
          - "@types/*"
        exclude-patterns:
          - "eslint-config-next"
          - "eslint-plugin-cypress"
          - "babel-jest"
          - "@types/react"
          - "@types/react-dom"
          - "@types/react-test-renderer"
          - "@types/jest"
          - "@types/supertest"
          - "@types/emoji-mart"
          - "@types/react-datepicker"
          - "@types/react-grid-layout"
      testing:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "jest"
          - "jest-*"
          - "*-jest"
          - "@types/jest"
          - "@testing-library/*"
          - "@faker-js/*"
          - "cypress"
          - "eslint-plugin-cypress"
          - "supertest"
          - "@types/supertest"
          - "nock"
          - "jsdom"
          - "happy-dom"
          - "snapshot-diff"
          - "@types/react-test-renderer"
      ui:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "@mui/*"
          - "@emotion/*"
          - "@tiptap/*"
          - "yjs"
          - "y-protocols"
          - "@base-ui-components/*"
          - "@dnd-kit/*"
          - "@uiw/*"
          - "rsuite"
          - "recharts"
          - "react-aria"
          - "react-icons"
          - "react-datepicker"
          - "react-dropzone"
          - "react-grid-layout"
          - "react-sortable-hoc"
          - "react-player"
          - "react-tweet"
          - "react-ad-manager"
          - "react-turnstile"
          - "@hcaptcha/*"
          - "keen-slider"
          - "emoji-mart"
          - "polished"
          - "qr-code-styling"
          - "dangerously-set-html-content"
          - "@iframe-resizer/*"
          - "@typeform/*"
          - "@types/emoji-mart"
          - "@types/react-datepicker"
          - "@types/react-grid-layout"
      unimportant:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
        exclude-patterns:
          - "nx"
          - "@nx/*"
          - "@nestjs/*"
          - "nestjs-*"
          - "next"
          - "@next/*"
          - "prisma"
          - "@prisma/*"
          - "react"
          - "react-dom"
          - "@apollo/*"
          - "apollo-*"
          - "graphql"
          - "graphql-*"
          - "@graphql-codegen/*"
          - "@graphql-tools/*"
          - "storybook"
          - "storybook-*"
          - "@storybook/*"
          - "@chromatic-com/storybook"
          - "jest"
          - "jest-*"
          - "*-jest"
          - "@testing-library/*"
          - "@faker-js/*"
          - "cypress"
          - "supertest"
          - "nock"
          - "jsdom"
          - "happy-dom"
          - "snapshot-diff"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
          - "pretty-quick"
          - "husky"
          - "@mui/*"
          - "@emotion/*"
          - "@tiptap/*"
          - "yjs"
          - "y-protocols"
          - "@base-ui-components/*"
          - "@dnd-kit/*"
          - "@uiw/*"
          - "rsuite"
          - "recharts"
          - "react-aria"
          - "react-icons"
          - "react-datepicker"
          - "react-dropzone"
          - "react-grid-layout"
          - "react-sortable-hoc"
          - "react-player"
          - "react-tweet"
          - "react-ad-manager"
          - "react-turnstile"
          - "@hcaptcha/*"
          - "keen-slider"
          - "emoji-mart"
          - "polished"
          - "qr-code-styling"
          - "dangerously-set-html-content"
          - "@iframe-resizer/*"
          - "@typeform/*"
          - "@sentry/*"
          - "@babel/*"
          - "babel-*"
          - "@swc/*"
          - "@swc-node/*"
          - "swc-loader"
          - "webpack"
          - "*-webpack-plugin"
          - "@svgr/webpack"
          - "@pmmmwh/*"
          - "react-refresh"
          - "url-loader"
          - "typescript"
          - "ts-node"
          - "tsx"
          - "tslib"
          - "@types/*"
      important-security:
        applies-to: security-updates
        patterns:
          - "nx"
          - "@nx/*"
          - "@nestjs/*"
          - "nestjs-*"
          - "next"
          - "@next/*"
          - "eslint-config-next"
          - "prisma"
          - "@prisma/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@apollo/*"
          - "apollo-*"
      unimportant-security:
        applies-to: security-updates
        patterns:
          - "*"
        exclude-patterns:
          - "nx"
          - "@nx/*"
          - "@nestjs/*"
          - "nestjs-*"
          - "next"
          - "@next/*"
          - "eslint-config-next"
          - "prisma"
          - "@prisma/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@apollo/*"
          - "apollo-*"
